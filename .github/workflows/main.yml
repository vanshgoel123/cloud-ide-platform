# CI/CD — Lint, Test, Build, Push

name: CI Pipeline
on:
  push:
    branches: 
      - main
  pull_request:
    branches:
      - main
jobs:
  Lint-Test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r api/requirements.txt pytest ruff

      - name: Lint
        run: ruff check api/

      - name: Test
        env:
          PYTHONPATH: api
          DB_PATH: ./test-workspaces.db
        run: pytest -q

  build-push:
    needs: Lint-Test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cloudide-api:latest ./api
          docker tag ${{ secrets.DOCKER_USERNAME }}/cloudide-api:latest ${{ secrets.DOCKER_USERNAME }}/cloudide-api:${{ github.sha }}

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/cloudide-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/cloudide-api:${{ github.sha }}
